<!DOCTYPE html>
<html>
<head>
    <title>Measure Flowchart Node</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #canvas-container { position: relative; margin-top: 20px; display: inline-block; border: 1px solid #ccc; }
        canvas { display: block; cursor: crosshair; }
        #info { margin-top: 10px; font-size: 1.2em; font-weight: bold; color: #d32f2f; }
        #overlay {
            position: absolute; border: 2px solid red; background: rgba(255, 0, 0, 0.2);
            pointer-events: none; display: none;
        }
    </style>
</head>
<body>
    <h2>FlowRevamp - Node Measure Tool</h2>
    <p>Chọn ảnh flowchart, sau đó <strong>kéo thả chuột</strong> trên ảnh để đo kích thước của node.</p>
    <input type="file" id="file-input" accept="image/*">
    <div id="info">WIDTH,HEIGHT: 0,0</div>
    <div id="canvas-container">
        <canvas id="canvas"></canvas>
        <div id="overlay"></div>
    </div>

    <script>
        const input = document.getElementById('file-input');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const info = document.getElementById('info');
        
        let isDrawing = false;
        let startX = 0;
        let startY = 0;

        input.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    overlay.style.display = 'none';
                    info.innerText = 'WIDTH,HEIGHT: 0,0';
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // Get mouse position in canvas coordinates, clamped to canvas bounds
        function getCanvasPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            let x = (e.clientX - rect.left) * scaleX;
            let y = (e.clientY - rect.top) * scaleY;

            x = Math.max(0, Math.min(canvas.width, x));
            y = Math.max(0, Math.min(canvas.height, y));
            return { x, y };
        }

        canvas.addEventListener('mousedown', (e) => {
            if (canvas.width === 0) return;
            e.preventDefault();
            isDrawing = true;
            const pos = getCanvasPos(e);
            startX = pos.x;
            startY = pos.y;

            overlay.style.left = startX + 'px';
            overlay.style.top = startY + 'px';
            overlay.style.width = '0px';
            overlay.style.height = '0px';
            overlay.style.display = 'block';
        });

        // Listen on window so dragging keeps working outside the canvas
        window.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const pos = getCanvasPos(e);

            const w = Math.abs(pos.x - startX);
            const h = Math.abs(pos.y - startY);
            const left = Math.min(pos.x, startX);
            const top = Math.min(pos.y, startY);

            overlay.style.left = left + 'px';
            overlay.style.top = top + 'px';
            overlay.style.width = w + 'px';
            overlay.style.height = h + 'px';

            info.innerText = `WIDTH,HEIGHT: ${Math.round(w)},${Math.round(h)}`;
        });

        window.addEventListener('mouseup', () => {
            isDrawing = false;
        });
    </script>
</body>
</html>
